# TeamFlow 프론트 + 백엔드 한 번에 실행
#   실행:  docker compose up --build
#   접속:  프론트 http://localhost:3000  ·  백엔드/Swagger http://localhost:8080/swagger-ui.html
#   종료:  docker compose down
services:
  postgres:
    image: postgres:16-alpine
    container_name: teamflow-postgres
    environment:
      POSTGRES_USER: teamflow
      POSTGRES_PASSWORD: teamflow1234
      POSTGRES_DB: teamflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: teamflow-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9ydGVhbWZsb3diYWNrZW5kYXBw
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DB_URL: jdbc:postgresql://postgres:5432/teamflow
      DB_USERNAME: teamflow
      DB_PASSWORD: teamflow1234
      # 이메일 발송 (Gmail 앱 비밀번호 사용 권장)
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: teamflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
