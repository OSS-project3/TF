spring.application.name=teamflow-backend
spring.profiles.active=local

# JWT
jwt.secret=${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9ydGVhbWZsb3diYWNrZW5kYXBw}
