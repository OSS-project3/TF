spring.application.name=teamflow-backend
spring.profiles.active=local

# JWT
jwt.secret=${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9ydGVhbWZsb3diYWNrZW5kYXBw}
jwt.access-token-expiry=3600000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# OpenAI (실제 키는 application-local.properties에 설정)
openai.base-url=https://api.openai.com/v1
openai.model=gpt-4o-mini
openai.api-key=${OPENAI_API_KEY:}

# GitHub Webhook (실제 secret은 application-local.properties 또는 환경변수로 설정)
github.webhook.secret=${GITHUB_WEBHOOK_SECRET:}