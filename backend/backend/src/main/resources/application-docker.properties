# Docker 컨테이너용 설정 — PostgreSQL (데이터 영속성)
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/teamflow}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:teamflow}
spring.datasource.password=${DB_PASSWORD:teamflow1234}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

github.webhook.secret=${GITHUB_WEBHOOK_SECRET:}

# Mail — docker-compose 에서 MAIL_* 환경변수로 주입
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.base-url=${APP_BASE_URL:http://localhost:3000}
